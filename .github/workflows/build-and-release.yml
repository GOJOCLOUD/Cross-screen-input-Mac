name: Build macOS Distribution (Apple Silicon)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: macos-arm64-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  BACKEND_EXE_NAME: "kpsr-backend"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate signing and notarization secrets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER)
          for k in "${required[@]}"; do
            if [[ -z "${!k:-}" ]]; then
              echo "Missing required secret for release tag: $k"
              exit 1
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: hotspot/backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: electron/package.json

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r hotspot/backend/requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Build backend binary (arm64 host)
        shell: bash
        run: |
          cd hotspot/backend
          pyinstaller \
            --onefile \
            --noconfirm \
            --clean \
            --name "${BACKEND_EXE_NAME}" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import pydantic \
            --hidden-import pydantic_settings \
            --hidden-import pydantic_core \
            --hidden-import fastapi \
            --hidden-import starlette \
            --hidden-import pynput \
            --hidden-import pynput.keyboard \
            --hidden-import pynput.mouse \
            --hidden-import pyperclip \
            --hidden-import PIL \
            --hidden-import psutil \
            --hidden-import websockets \
            --hidden-import websockets.legacy \
            --hidden-import websockets.legacy.server \
            --hidden-import websockets.legacy.client \
            --hidden-import python_multipart \
            --collect-all cryptography \
            --collect-all pynput \
            --collect-all fastapi \
            --collect-all starlette \
            --collect-all uvicorn \
            --add-data "../frontend:frontend" \
            --add-data "data:data" \
            --add-data "routes:routes" \
            --add-data "utils:utils" \
            --add-data "config.py:." \
            main.py

      - name: Stage backend for Electron
        shell: bash
        run: |
          bin="hotspot/backend/dist/${BACKEND_EXE_NAME}"
          test -f "${bin}"
          chmod +x "${bin}"
          file "${bin}"
          mkdir -p electron/resources/backend
          cp -f "${bin}" electron/resources/backend/kpsr-backend
          rm -f electron/resources/backend/.gitkeep

      - name: Prepare non-infringing app icon (80% scale)
        shell: bash
        run: |
          mkdir -p electron/build
          src="hotspot/images/app-icon-1080x1080.png"
          test -f "${src}"
          python3 - <<'PY'
          from PIL import Image
          src = Image.open("hotspot/images/app-icon-1080x1080.png").convert("RGBA")
          canvas_size = 1024
          scaled_size = int(canvas_size * 0.8)  # 80%
          scaled = src.resize((scaled_size, scaled_size), Image.LANCZOS)
          canvas = Image.new("RGBA", (canvas_size, canvas_size), (0, 0, 0, 0))
          offset = ((canvas_size - scaled_size) // 2, (canvas_size - scaled_size) // 2)
          canvas.paste(scaled, offset, scaled)
          canvas.save("electron/build/icon-base-1024.png")
          PY
          iconset="electron/build/icon.iconset"
          rm -rf "${iconset}"
          mkdir -p "${iconset}"
          sips -z 16 16   electron/build/icon-base-1024.png --out "${iconset}/icon_16x16.png" >/dev/null
          sips -z 32 32   electron/build/icon-base-1024.png --out "${iconset}/icon_16x16@2x.png" >/dev/null
          sips -z 32 32   electron/build/icon-base-1024.png --out "${iconset}/icon_32x32.png" >/dev/null
          sips -z 64 64   electron/build/icon-base-1024.png --out "${iconset}/icon_32x32@2x.png" >/dev/null
          sips -z 128 128 electron/build/icon-base-1024.png --out "${iconset}/icon_128x128.png" >/dev/null
          sips -z 256 256 electron/build/icon-base-1024.png --out "${iconset}/icon_128x128@2x.png" >/dev/null
          sips -z 256 256 electron/build/icon-base-1024.png --out "${iconset}/icon_256x256.png" >/dev/null
          sips -z 512 512 electron/build/icon-base-1024.png --out "${iconset}/icon_256x256@2x.png" >/dev/null
          sips -z 512 512 electron/build/icon-base-1024.png --out "${iconset}/icon_512x512.png" >/dev/null
          cp electron/build/icon-base-1024.png "${iconset}/icon_512x512@2x.png"
          iconutil -c icns "${iconset}" -o electron/build/icon.icns
          ls -la electron/build

      - name: Install Electron deps
        shell: bash
        working-directory: electron
        run: npm install

      - name: Build Electron app (arm64 only, unsigned for main/pr)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        working-directory: electron
        run: npm run dist:mac:arm64 -- --config.mac.identity=null

      - name: Build Electron app (arm64 only, signed for tags)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: electron
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac:arm64

      - name: Collect arm64 app bundle zip
        shell: bash
        run: |
          mkdir -p out/arm64
          app_path="electron/dist/mac-arm64/跨屏输入.app"
          test -d "${app_path}"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "out/arm64/跨屏输入-arm64.app.zip"
          ls -la out/arm64

      - name: Validate package outputs
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          ls -la out/arm64
          compgen -G "out/arm64/*.app.zip" > /dev/null

      - name: Move dev-latest-macos tag to current commit (main only)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-latest-macos "${{ github.sha }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin dev-latest-macos

      - name: Publish dev pre-release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest-macos
          name: "开发版 macOS（Apple Silicon / arm64）"
          prerelease: true
          make_latest: false
          overwrite: true
          files: |
            out/arm64/*.app.zip
          body: |
            macOS 开发版（仅 Apple Silicon / arm64）：
            - arm64: Apple Silicon
            下载 `.app.zip` 后解压，将 `跨屏输入.app` 拖到桌面后再自签名测试。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (tags only)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: KPSR 跨屏输入（macOS）${{ github.ref_name }}
          files: |
            out/arm64/*.app.zip
          overwrite: true
          body: |
            macOS 应用包（仅 Apple Silicon / arm64）：
            - arm64（Apple Silicon）：`.app.zip`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
